<!DOCTYPE html>
<html lang="en" style="background-color: #0f172a;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CathHub — Catheter Compatibility Tool</title>
  <link rel="icon" type="image/x-icon" href="favicon.svg">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div id="splash" class="splash" style="background-color: #0f172a;">
    <div class="splash-content" style="background-color: #0f172a;">
      <img src="logo.svg" alt="CathHub" class="splash-logo" style="width: 240px; height: auto; margin-bottom: 12px;">
      <div class="splash-tag">Premium catheter compatibility tool</div>
      <div class="splash-loader" style="border-color: #64748b; border-top-color: #3b82f6;"></div>
    </div>
  </div>

  <header>
    <div class="logo">
      <img src="logo.svg" alt="CathHub" style="width: 160px; height: auto;">
    </div>
    <div class="version">v2.0</div>
  </header>

  <div class="tab-bar" role="tablist">
    <button class="tab active" data-tab="fast" role="tab" aria-selected="true" aria-controls="tab-fast">Fast Check</button>
    <button class="tab" data-tab="detail" role="tab" aria-selected="false" aria-controls="tab-detail">Detail View</button>
    <button class="tab" data-tab="all" role="tab" aria-selected="false" aria-controls="tab-all">Reference</button>
  </div>

  <main>
    <div id="tab-fast" class="panel panel-entering" role="tabpanel" style="display: block;">
      <div class="section" style="margin-top: 20px;">
        <div class="section-label">Inner Catheters</div>
        <div class="result-card" style="padding: 12px 16px;">
          <div class="slot-group" id="slot-1">
            <div class="slot-label">Slot 1</div>
            <select id="micro-1" class="slot-select" placeholder="Select a microcatheter">
              <option value="">Select a microcatheter</option>
            </select>
            <div id="slot-od-1" class="slot-od hidden">OD 0.00</div>
            <button id="slot-clear-1" class="slot-clear hidden">×</button>
          </div>
          <div class="slot-group" id="slot-2">
            <div class="slot-label">Slot 2</div>
            <select id="micro-2" class="slot-select" placeholder="Select a microcatheter">
              <option value="">Select a microcatheter</option>
            </select>
            <div id="slot-od-2" class="slot-od hidden">OD 0.00</div>
            <button id="slot-clear-2" class="slot-clear hidden">×</button>
          </div>
          <div class="slot-group" id="slot-3">
            <div class="slot-label">Slot 3</div>
            <select id="micro-3" class="slot-select" placeholder="Select a microcatheter">
              <option value="">Select a microcatheter</option>
            </select>
            <div id="slot-od-3" class="slot-od hidden">OD 0.00</div>
            <button id="slot-clear-3" class="slot-clear hidden">×</button>
          </div>
        </div>
      </div>
      <div id="fast-result" class="section" style="margin-top: 16px; margin-bottom: 24px;"></div>
    </div>

    <div id="tab-detail" class="panel" role="tabpanel" style="display: none;">
      <div class="section" style="margin-top: 20px;">
        <div class="section-label">Access Catheter</div>
        <div class="result-card" style="padding: 12px 16px;">
          <div class="slot-group" style="margin-bottom: 0;">
            <select id="detail-access" class="slot-select" placeholder="Select an access catheter">
              <option value="">Select an access catheter</option>
            </select>
          </div>
        </div>
      </div>
      <div class="section" style="margin-top: 16px;">
        <div class="section-label">Inner Catheter</div>
        <div class="result-card" style="padding: 12px 16px;">
          <div class="slot-group" style="margin-bottom: 0;">
            <select id="detail-micro" class="slot-select" placeholder="Select an inner catheter">
              <option value="">Select an inner catheter</option>
            </select>
          </div>
        </div>
      </div>
      <div id="detail-result" class="section" style="margin-top: 16px; margin-bottom: 24px;"></div>
    </div>

    <div id="tab-all" class="panel" role="tabpanel" style="display: none;">
      <!-- Dynamically populated by renderAllCategories() in app.js -->
    </div>
  </main>

  <footer id="last-updated">Updated Mar 2026</footer>

  <script src="data.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
